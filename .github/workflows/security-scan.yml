name: Security Scan

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: '0 2 * * 1'   # Every Monday 2 AM
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # Stage 1 — Strip notebook outputs and convert to .py
  # Notebooks store outputs (images, printed tokens, API responses)
  # in JSON — must be stripped BEFORE any secret scanner sees them.
  # Uses nbconvert --clear-output which handles old nbformat gracefully.
  # ─────────────────────────────────────────────────────────────
  prepare:
    name: Prepare (Strip & Convert Notebooks)
    runs-on: ubuntu-latest
    outputs:
      has_notebooks: ${{ steps.detect.outputs.has_notebooks }}
      has_requirements: ${{ steps.detect.outputs.has_requirements }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Detect project structure
        id: detect
        run: |
          nb_count=$(find . -name "*.ipynb" \
            -not -path "./.git/*" \
            -not -path "*/.ipynb_checkpoints/*" | wc -l | tr -d ' ')
          echo "Found $nb_count notebooks"
          echo "has_notebooks=$([ "$nb_count" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT

          req_exists=false
          { [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f setup.py ]; } && req_exists=true || true
          echo "has_requirements=$req_exists" >> $GITHUB_OUTPUT

      - name: Install notebook tools
        if: steps.detect.outputs.has_notebooks == 'true'
        run: pip install --quiet nbconvert nbqa

      - name: Strip outputs and convert notebooks to Python
        if: steps.detect.outputs.has_notebooks == 'true'
        run: |
          # Work on a copy — never modify checked-out source
          cp -r . /tmp/stripped
          mkdir -p /tmp/converted

          find /tmp/stripped -name "*.ipynb" \
            -not -path "*/.git/*" \
            -not -path "*/.ipynb_checkpoints/*" | while read nb; do

            # Strip all cell outputs in-place
            # nbconvert --clear-output handles old nbformat (missing id fields) gracefully
            jupyter nbconvert --clear-output --inplace "$nb" 2>/dev/null \
              && echo "✓ stripped: ${nb#/tmp/stripped/}" \
              || echo "⚠ strip failed (skipping): ${nb#/tmp/stripped/}"

            # Convert to .py preserving relative directory structure
            rel_dir=$(dirname "${nb#/tmp/stripped/}")
            mkdir -p "/tmp/converted/$rel_dir"
            jupyter nbconvert --to script "$nb" \
              --output-dir "/tmp/converted/$rel_dir" \
              --no-prompt 2>/dev/null \
              && echo "✓ converted: ${nb#/tmp/stripped/}" \
              || echo "⚠ convert skipped: ${nb#/tmp/stripped/}"
          done

          echo ""
          echo "── Summary ──────────────────────────────"
          echo "Stripped notebooks : $(find /tmp/stripped  -name '*.ipynb' | wc -l | tr -d ' ')"
          echo "Converted .py files: $(find /tmp/converted -name '*.py'    | wc -l | tr -d ' ')"

      - uses: actions/upload-artifact@v4
        if: steps.detect.outputs.has_notebooks == 'true'
        with:
          name: stripped-notebooks
          path: /tmp/stripped/
          retention-days: 1

      - uses: actions/upload-artifact@v4
        if: steps.detect.outputs.has_notebooks == 'true'
        with:
          name: converted-py
          path: /tmp/converted/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # Stage 2a — Secret Detection
  # Scan git history (TruffleHog), current files (Gitleaks),
  # and code cells in stripped notebooks (detect-secrets).
  # ─────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Scans full git history — catches secrets that were committed
      # inside notebook output cells in the past, even if stripped now
      - name: TruffleHog (git history)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before || github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # Scan stripped notebooks for secrets in CODE cells only
      - name: Download stripped notebooks
        if: needs.prepare.outputs.has_notebooks == 'true'
        uses: actions/download-artifact@v4
        with:
          name: stripped-notebooks
          path: /tmp/stripped

      - name: detect-secrets (code cells only)
        if: needs.prepare.outputs.has_notebooks == 'true'
        run: |
          pip install --quiet detect-secrets
          detect-secrets scan /tmp/stripped \
            --all-files \
            --force-use-all-plugins \
            --exclude-files '.*\.git/.*' \
            --exclude-files '.*ipynb_checkpoints.*' \
            > .secrets.json || true

          python3 - << 'EOF'
          import json, sys
          data   = json.load(open('.secrets.json'))
          hits   = data.get('results', {})
          total  = sum(len(v) for v in hits.values())
          if total:
              print(f'::warning::detect-secrets: {total} potential secret(s) found')
              for path, findings in hits.items():
                  for f in findings:
                      print(f'::warning file={path},line={f["line_number"]}::{f["type"]}')
          else:
              print('detect-secrets: clean ✓')
          EOF

  # ─────────────────────────────────────────────────────────────
  # Stage 2b — Static Analysis (SAST)
  # Run bandit via nbqa directly on .ipynb (most accurate),
  # and semgrep on both source .py + converted notebook .py files.
  # ─────────────────────────────────────────────────────────────
  sast-scan:
    name: Static Analysis (SAST)
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download stripped notebooks
        if: needs.prepare.outputs.has_notebooks == 'true'
        uses: actions/download-artifact@v4
        with:
          name: stripped-notebooks
          path: /tmp/stripped

      - name: Download converted Python
        if: needs.prepare.outputs.has_notebooks == 'true'
        uses: actions/download-artifact@v4
        with:
          name: converted-py
          path: /tmp/converted

      - name: Install scanners
        run: pip install --quiet "bandit[toml]" nbqa semgrep

      # nbqa runs bandit INSIDE each notebook cell-by-cell
      # This is more accurate than scanning converted .py files
      - name: nbqa bandit (notebooks direct)
        if: needs.prepare.outputs.has_notebooks == 'true'
        run: |
          echo "── nbqa bandit on stripped notebooks ──────────────"
          nbqa bandit /tmp/stripped \
            --recursive \
            --level medium \
            --confidence medium \
            2>/dev/null \
            || echo "::warning::bandit found issues in notebooks"

      - name: Bandit (source .py files)
        run: |
          echo "── bandit on source .py ────────────────────────────"
          bandit -r . \
            --exclude "./.git,./venv,./.venv,./env" \
            --level medium \
            --confidence medium \
            --format sarif \
            --output bandit.sarif \
            2>/dev/null || true
          bandit -r . \
            --exclude "./.git,./venv,./.venv,./env" \
            --level medium \
            --confidence medium \
            2>/dev/null \
            || echo "::warning::bandit found issues in source"

      # Semgrep 1.x supports .ipynb natively
      - name: Semgrep
        run: |
          echo "── semgrep ─────────────────────────────────────────"
          EXTRA=""
          [ -d /tmp/converted ] && EXTRA="/tmp/converted"
          semgrep scan \
            --config=p/python \
            --config=p/security-audit \
            --config=p/secrets \
            --sarif --output=semgrep.sarif \
            --exclude=".git" --exclude="venv" --exclude=".venv" \
            . $EXTRA \
            --no-error 2>/dev/null \
            || echo "::warning::semgrep found issues"

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit.sarif
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # Stage 2c — Dependency Vulnerabilities
  # ─────────────────────────────────────────────────────────────
  dependency-scan:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.has_requirements == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: pip-audit
        run: |
          pip install --quiet pip-audit
          pip-audit -r requirements.txt --desc \
            || echo "::warning::pip-audit found vulnerable packages"

      # Bonus: cross-check notebook imports against requirements.txt
      - name: Audit notebook imports vs requirements.txt
        if: needs.prepare.outputs.has_notebooks == 'true'
        run: |
          python3 - << 'EOF'
          import json, glob, re, pathlib

          req_file = pathlib.Path('requirements.txt')
          declared = set()
          if req_file.exists():
              for line in req_file.read_text().splitlines():
                  m = re.match(r'^([A-Za-z0-9_\-]+)', line.strip())
                  if m:
                      declared.add(m.group(1).lower().replace('-','_'))

          nb_imports = set()
          for nb_path in glob.glob('**/*.ipynb', recursive=True):
              try:
                  nb = json.load(open(nb_path))
                  for cell in nb.get('cells', []):
                      if cell['cell_type'] == 'code':
                          for line in cell.get('source', []):
                              match = re.match(r'^\s*(?:import|from)\s+([\w]+)', line)
                              if match:
                                  nb_imports.add(match.group(1).lower())
              except Exception:
                  pass

          stdlib = {'os','sys','re','json','pathlib','datetime','collections',
                    'itertools','functools','typing','math','random','time',
                    'hashlib','base64','io','copy','abc','enum','warnings',
                    'logging','argparse','subprocess','shutil','tempfile',
                    'contextlib','dataclasses','threading','concurrent'}
          external    = nb_imports - stdlib - {'__future__'}
          undeclared  = external - declared

          print(f'Notebook imports   : {sorted(external)}')
          print(f'Declared in req.txt: {sorted(declared)}')
          if undeclared:
              print(f'::warning::Undeclared deps in notebooks: {sorted(undeclared)}')
          else:
              print('All notebook imports covered in requirements.txt ✓')
          EOF

  # ─────────────────────────────────────────────────────────────
  # Stage 3 — Summary (always runs, handles skipped jobs cleanly)
  # ─────────────────────────────────────────────────────────────
  security-report:
    name: Security Report
    runs-on: ubuntu-latest
    needs: [prepare, secret-scan, sast-scan, dependency-scan]
    if: always()

    steps:
      - name: Generate Summary
        uses: actions/github-script@v7
        with:
          script: |
            const needs = ${{ toJson(needs) }};
            const icon  = { success:'✅', failure:'❌', skipped:'⏭️', cancelled:'🚫' };

            let md = '# 🔒 Security Scan Results\n\n';
            md += '| Job | Result |\n|-----|--------|\n';
            for (const [name, job] of Object.entries(needs)) {
              md += `| ${name} | ${icon[job.result] ?? '❓'} ${job.result} |\n`;
            }

            const failed = Object.entries(needs).filter(([,j]) => j.result === 'failure');
            md += failed.length > 0
              ? `\n⚠️ **${failed.length} job(s) need attention:** ${failed.map(([n])=>n).join(', ')}\n`
              : '\n✅ All scans passed.\n';

            await core.summary.addRaw(md).write();

            if (context.eventName === 'pull_request' && failed.length > 0) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: md
              });
            }
